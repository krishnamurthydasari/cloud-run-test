# =====================================================
# CLOUD DEPLOY DELIVERY PIPELINE  
# -----------------------------------------------------
# Defines how application releases move through
# environments (dev → qa → prod)
#
# Uses SERIAL PIPELINE:
#   - Deploys sequentially across environments
#   - Each stage must complete before next begins
# =====================================================
apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline

metadata:
  name: my-pipeline    # Pipeline name referenced in Cloud Build

serialPipeline:
  stages:

    # =====================================================
    # STAGE 1: DEV ENVIRONMENT
    # Automatically deploys first
    # =====================================================
    - targetId: dev
      # profiles: ["dev"]

    # =====================================================
    # STAGE 2: QA ENVIRONMENT
    # Gated with manual approval (recommended)
    # =====================================================
    - targetId: qa
      # profiles: ["qa"]

    # =====================================================
    # STAGE 3: PRODUCTION ENVIRONMENT
    # -----------------------------------------------------
    # Final deployment stage
    # Gated with manual approval (recommended)
    # =====================================================
    - targetId: prod
      # profiles: ["prod"]

---
# =====================================================
# TARGET: DEV ENVIRONMENT
# -----------------------------------------------------
# Defines where the application is deployed for dev
#
# run.location:
#   Cloud Run region + project where service runs
# =====================================================
apiVersion: deploy.cloud.google.com/v1
kind: Target

metadata:
  name: dev

run:
  location: projects/shadowcoo/locations/us-central1

---
# =====================================================
# TARGET: QA ENVIRONMENT
# requireApproval:
#   true → requires manual approval before deployment
#   adds protection against accidental production updates
# =====================================================
apiVersion: deploy.cloud.google.com/v1
kind: Target

metadata:
  name: qa

requireApproval: true

run:
  location: projects/shadowcoo/locations/us-central1

---
# =====================================================
# TARGET: PRODUCTION ENVIRONMENT
# -----------------------------------------------------
# Final deployment destination
#
# requireApproval:
#   true → requires manual approval before deployment
#   adds protection against accidental production updates
# =====================================================
apiVersion: deploy.cloud.google.com/v1
kind: Target

metadata:
  name: prod

requireApproval: true

run:
  location: projects/shadowcoo/locations/us-central1
