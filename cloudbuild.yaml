# =====================================================
# Cloud Build Pipeline
# -----------------------------------------------------
# This pipeline performs:
#   1. Build Docker image
#   2. Push image to Artifact Registry
#   3. Create a Cloud Deploy release
# =====================================================

steps:

  # =====================================================
  # STEP 1: BUILD DOCKER IMAGE
  # -----------------------------------------------------
  # Builds the container image from the current directory
  #
  # - Uses Dockerfile in repo root (.)
  # - Tags image with SHORT_SHA (commit-based versioning)
  # - Stores image in Artifact Registry
  # =====================================================
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/my-docker-repo/my-image:${SHORT_SHA}'
      - .

  # =====================================================
  # STEP 2: PUSH IMAGE TO ARTIFACT REGISTRY
  # -----------------------------------------------------
  # Pushes the built image to Google Artifact Registry
  #
  # - Required before deployment
  # - Makes image available to Cloud Run / Cloud Deploy
  # =====================================================
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/my-docker-repo/my-image:${SHORT_SHA}'

  # =====================================================
  # STEP 3: CREATE CLOUD DEPLOY RELEASE
  # -----------------------------------------------------
  # Creates a new release in Cloud Deploy pipeline
  #
  # - Uses unique release name:
  #     SERVICE + COMMIT_SHA + BUILD_ID
  #
  # - Links built image to deployment pipeline
  # - Triggers deployment to defined targets (dev/stage/prod)
  #
  # Key parameters:
  #   --delivery-pipeline → pipeline name
  #   --region            → location of pipeline
  #   --images            → maps image name to built artifact
  # =====================================================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - 'orquesta-ui-${SHORT_SHA}-${BUILD_ID}'
      - '--delivery-pipeline=my-pipeline'
      - '--region=us-central1'
      - '--images=orquesta-ui=us-central1-docker.pkg.dev/${PROJECT_ID}/my-docker-repo/my-image:${SHORT_SHA}'

# =====================================================
# BUILD OPTIONS
# -----------------------------------------------------
# logging:
#   CLOUD_LOGGING_ONLY → logs stored only in Cloud Logging
#   (reduces noisy output in Cloud Build UI if needed)
# =====================================================
options:
  logging: CLOUD_LOGGING_ONLY
