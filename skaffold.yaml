# ---------------------------------------------
# Skaffold Configuration (Deployment Engine)
# ---------------------------------------------
apiVersion: skaffold/v4beta6        # Skaffold API version (used by Cloud Deploy internally)
kind: Config                        # Defines a Skaffold configuration

metadata:
  name: my-app                      # Logical application name
                                    # This must match the placeholder used in:
                                    # service.yaml → image: my-app

# ---------------------------------------------
# Deployment Type Definition
# ---------------------------------------------
# REQUIRED when using Cloud Run with Cloud Deploy
deploy:
  cloudrun: {}                      # Tells Skaffold to deploy to Cloud Run
                                    # Without this, Skaffold defaults to Kubernetes (GKE),
                                    # which will cause deployment failures

# ---------------------------------------------
# Default Manifest Configuration
# ---------------------------------------------
manifests:
  rawYaml:
    - service-dev.yaml              # Default manifest used if no profile is selected
                                    # Typically corresponds to dev environment

# ---------------------------------------------
# Profiles for Different Environments
# ---------------------------------------------
# Profiles allow environment-specific deployment configurations
# Cloud Deploy automatically maps:
# targetId (dev/prod) → profile name (dev/prod)
profiles:

# ---------------------------------------------
# Dev Environment Profile
# ---------------------------------------------
- name: dev                         # Profile name must match targetId in clouddeploy.yaml
  manifests:
    rawYaml:
      - service-dev.yaml            # Uses dev-specific Cloud Run service definition
                                    # This deploys to:
                                    # Cloud Run service → my-service-dev

# ---------------------------------------------
# Prod Environment Profile
# ---------------------------------------------
- name: prod                        # Profile name matches 'prod' target
  manifests:
    rawYaml:
      - service-prod.yaml           # Uses prod-specific service definition
                                    # This deploys to:
                                    # Cloud Run service → my-service-prod
