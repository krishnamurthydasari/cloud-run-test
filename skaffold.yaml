# =====================================================
# SKAFFOLD CONFIGURATION FOR CLOUD RUN
# -----------------------------------------------------
# Skaffold is used by Cloud Deploy to:
#   - Render manifests
#   - Select environment-specific configurations
#   - Deploy Cloud Run services
#
# In this setup:
#   - No build phase (handled by Cloud Build)
#   - Only deploy phase is defined
# =====================================================
apiVersion: skaffold/v4beta6
kind: Config

metadata:
  name: my-image   # Application/service identifier

# =====================================================
# DEPLOY CONFIGURATION
# -----------------------------------------------------
# Specifies how resources are deployed
#
# cloudrun:
#   Uses Cloud Run deployment mechanism
#   Applies rendered manifests directly to Cloud Run
# =====================================================
deploy:
  cloudrun: {}

# =====================================================
# PROFILES (ENVIRONMENT-SPECIFIC CONFIGURATION)
# -----------------------------------------------------
# Profiles allow deploying different configurations
# per environment (dev / qa / prod)
#
# Each profile:
#   - Selects a specific service YAML file
#   - Enables environment-specific settings like:
#       - scaling
#       - ingress
#       - resource limits
#       - env variables
# =====================================================
profiles:

  # =====================================================
  # DEV PROFILE
  # =====================================================
  - name: dev
    manifests:
      rawYaml:
        - service-dev.yaml

  # =====================================================
  # QA PROFILE
  # =====================================================
  - name: qa
    manifests:
      rawYaml:
        - service-qa.yaml

  # =====================================================
  # PROD PROFILE
  # =====================================================
  - name: prod
    manifests:
      rawYaml:
        - service-prod.yaml
