apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: my-app

manifests:
  rawYaml:
    - service-dev.yaml   # default (dev)

# ---------------------------------------------
# Profiles for different environments
# ---------------------------------------------
profiles:

# ✅ Dev profile
- name: dev
  manifests:
    rawYaml:
      - service-dev.yaml

# ✅ Prod profile
- name: prod
  manifests:
    rawYaml:
      - service-prod.yaml
